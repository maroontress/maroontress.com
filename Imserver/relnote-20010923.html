    <h1>リリースノート 2001-09-23</h1>

    <ul>
      <li>予測候補の後始末処理の性能を改善した。</li>
      <li>テキスト操作APIの仕様を一部変更した。</li>
      <li>XICで指定されるフォントセットを共有するように変更した。詳細については<a href="bug-xcreatefontset.html">XCreateFontsSet()のバグ</a>を参照。X11R6.5.1以降では、新たなフォントセットを生成するときに使われてないフォントがあれば解放するようにしたが、それより古いリリースでは、いっさいフォントセットを解放しないようにした。</li>
    </ul>
